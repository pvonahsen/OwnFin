name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

  test-frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

  check-port:
    name: Port consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify port matches branch (run.sh and config.json)
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          if [ "$branch" = "main" ]; then
            expected=8000
          else
            expected=8001
          fi

          actual_run=$(grep -o '\-\-port [0-9]*' run.sh | awk '{print $2}')
          actual_cfg=$(python3 -c "import json; d=json.load(open('config.json')); print(list(d['ports'].values())[0])")

          ok=true
          if [ "$actual_run" != "$expected" ]; then
            echo "ERROR: run.sh has port $actual_run but branch '$branch' expects $expected"
            ok=false
          fi
          if [ "$actual_cfg" != "$expected" ]; then
            echo "ERROR: config.json has port $actual_cfg but branch '$branch' expects $expected"
            ok=false
          fi
          if [ "$ok" != "true" ]; then exit 1; fi
          echo "OK: branch '$branch' → port $expected (run.sh: $actual_run, config.json: $actual_cfg)"

  check-release:
    name: Release check (PRs to main only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify version bump and CHANGELOG update
        run: |
          git fetch origin main

          base_ver=$(git show origin/main:config.json | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          head_ver=$(python3 -c "import json; print(json.load(open('config.json'))['version'])")

          if [ "$base_ver" = "$head_ver" ]; then
            echo "ERROR: config.json version must be bumped before merging to main (both are $head_ver)"
            exit 1
          fi
          echo "OK: version bumped $base_ver → $head_ver"

          if ! git diff origin/main...HEAD --name-only | grep -q "^CHANGELOG\.md$"; then
            echo "ERROR: CHANGELOG.md must be updated in this PR before merging to main"
            exit 1
          fi
          echo "OK: CHANGELOG.md updated"

  build-docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
