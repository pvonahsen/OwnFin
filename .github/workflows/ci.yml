name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

  test-frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

  check-port:
    name: Port consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify port matches branch
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          actual=$(grep -o '\-\-port [0-9]*' run.sh | awk '{print $2}')
          if [ "$branch" = "main" ]; then
            expected=8000
          else
            expected=8001
          fi
          if [ "$actual" != "$expected" ]; then
            echo "ERROR: Branch '$branch' should use port $expected but run.sh has port $actual"
            exit 1
          fi
          echo "OK: branch '$branch' → port $actual"

  build-docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
